<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <title>Portfólio Roberto KS</title>
  <style>
    body {
      margin: 0;
      background-color: #0b1120;

      max-width: 900px;
      margin: 0 auto;

      margin: 0 auto;

    .project-card h3 {
